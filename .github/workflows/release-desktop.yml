name: Release Desktop

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  build-desktop-artifacts:
    name: build-desktop-artifacts (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact_name: desktop-macos
            artifact_paths: |
              apps/query-sheets-studio/src-tauri/target/release/bundle/macos/*.app
              apps/query-sheets-studio/src-tauri/target/release/bundle/dmg/*.dmg
          - platform: ubuntu-22.04
            artifact_name: desktop-linux
            artifact_paths: |
              apps/query-sheets-studio/src-tauri/target/release/bundle/appimage/*.AppImage
              apps/query-sheets-studio/src-tauri/target/release/bundle/deb/*.deb
          - platform: windows-latest
            artifact_name: desktop-windows
            artifact_paths: |
              apps/query-sheets-studio/src-tauri/target/release/bundle/msi/*.msi
              apps/query-sheets-studio/src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.ref_name }}
          persist-credentials: false
          submodules: recursive
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/query-sheets-studio/package-lock.json
      - name: Install Linux dependencies
        if: ${{ startsWith(matrix.platform, 'ubuntu') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        working-directory: apps/query-sheets-studio
        run: npm ci
      - name: Build desktop bundles
        working-directory: apps/query-sheets-studio
        run: npm run tauri:build -- --ci --no-sign
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: warn

  upload-desktop-to-release:
    needs:
      - build-desktop-artifacts
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: obraia/QuerySheets
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: desktop-*
          path: desktop-artifacts
          merge-multiple: true
      - name: Wait for release created by cargo-dist
        run: |
          for i in {1..80}; do
            if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
              echo "Release $RELEASE_TAG is ready"
              exit 0
            fi

            echo "Waiting for release $RELEASE_TAG... ($i/80)"
            sleep 15
          done

          echo "Release $RELEASE_TAG was not created in time"
          exit 1
      - name: Upload desktop assets to release
        run: |
          mapfile -t files < <(find desktop-artifacts -type f)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No desktop artifacts found to upload"
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --repo "$GH_REPO" --clobber